[build]
  command = "echo 'No build needed'"
  publish = "."
  functions = "netlify/functions"

# Headers de seguridad globales (anti-clickjacking + protección de auth gate).
# Importante: el gate de auth confía en que la app no se cargue dentro de un
# iframe ajeno, ya que un iframe podría capturar clicks via clickjacking sobre
# el formulario de login. X-Frame-Options DENY lo bloquea en navegadores
# antiguos; Content-Security-Policy frame-ancestors 'none' lo bloquea en
# navegadores modernos.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "frame-ancestors 'none'"
