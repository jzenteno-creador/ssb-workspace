        // ─── SUPABASE CRUD ───
        async function loadOrdersFromSupabase() {
            try {
                // Query 1: solo operaciones PENDIENTES para el sidebar
                const { data: ops, error: opsError } = await supabase
                    .from('operaciones')
                    .select('*')
                    .eq('estado', 'PENDIENTE')
                    .order('po', { ascending: false });

                if (opsError) throw opsError;

                // Also load recently validated orders (if any) so they remain viewable
                let recentOps = [];
                if (recentlyValidated.length > 0) {
                    const { data: rOps } = await supabase
                        .from('operaciones')
                        .select('*')
                        .in('po', recentlyValidated);
                    recentOps = rOps || [];
                }

                // Also load the current order if it's not pending (e.g. viewing a validated order)
                let currentOps = [];
                if (currentOrderId && !ops.some(o => o.po === currentOrderId) && !recentOps.some(o => o.po === currentOrderId)) {
                    const { data: cOps } = await supabase
                        .from('operaciones')
                        .select('*')
                        .eq('po', currentOrderId);
                    currentOps = cOps || [];
                }

                const allOps = [...ops, ...recentOps, ...currentOps];
                const opIds = allOps.map(o => o.id);

                // Query 2: contenedores solo de las operaciones cargadas
                let conts = [];
                if (opIds.length > 0) {
                    const { data: contsData, error: contsError } = await supabase
                        .from('contenedores')
                        .select('*')
                        .in('operacion_id', opIds);
                    if (contsError) throw contsError;
                    conts = contsData || [];
                }

                // Agrupar contenedores por operacion_id
                const contsByOp = {};
                for (const c of conts) {
                    if (!contsByOp[c.operacion_id]) contsByOp[c.operacion_id] = [];
                    contsByOp[c.operacion_id].push(c);
                }

                // Armar el objeto orders (sin duplicados)
                orders = {};
                for (const op of allOps) {
                    if (!orders[op.po]) {
                        orders[op.po] = { ...op, contenedores: contsByOp[op.id] || [] };
                    }
                }

                renderOrdersList();
                if (currentOrderId && orders[currentOrderId]) {
                    renderOrderPanel(orders[currentOrderId]);
                }
            } catch (error) {
                console.error('Error cargando datos:', error);
                showAlert('Error cargando datos de Supabase', 'error');
            }
        }

        // NOTA: En Supabase, la tabla 'contenedores' debe tener un UNIQUE constraint
        // sobre (operacion_id, precinto_aduana) en vez de solo (precinto_aduana).
        // Esto permite consolidaciones (mismo precinto en órdenes diferentes).
        // Para cambiar esto, ir a Supabase → SQL Editor y ejecutar:
        // ALTER TABLE contenedores DROP CONSTRAINT IF EXISTS contenedores_precinto_aduana_key;
        // ALTER TABLE contenedores ADD CONSTRAINT contenedores_operacion_precinto_unique UNIQUE (operacion_id, precinto_aduana);

        async function saveOrderToSupabase(orderData) {
            // Validar precintos duplicados en DISTINTOS contenedores de la misma orden
            // (mismo precinto en mismo contenedor con distintos productos es válido = multi-producto)
            if (orderData.contenedores && orderData.contenedores.length > 0) {
                const seen = {}; // precinto → numero de contenedor
                const realDuplicates = [];
                for (const c of orderData.contenedores) {
                    if (!c.precinto_aduana) continue;
                    if (seen[c.precinto_aduana] && seen[c.precinto_aduana] !== c.numero) {
                        realDuplicates.push(c.precinto_aduana);
                    }
                    seen[c.precinto_aduana] = c.numero;
                }
                if (realDuplicates.length > 0) {
                    throw new Error(`Precinto ${[...new Set(realDuplicates)].join(', ')} está duplicado en contenedores distintos de esta orden`);
                }
            }
            const upsertData = {
                    po: orderData.po,
                    ddt: orderData.ddt,
                    buque: orderData.buque,
                    destino: orderData.destino,
                    terminal: orderData.terminal,
                    canal: orderData.canal || '',
                    tipo_origen: orderData.tipo_origen || 'buenos_aires',
                    estado: orderData.estado || 'PENDIENTE',
                    cantidad_contenedores: orderData.cantidad_contenedores,
                    total_bultos: orderData.total_bultos,
                    total_peso_neto: orderData.total_peso_neto,
                    total_peso_bruto: orderData.total_peso_bruto
                };
            if (orderData.datos_originales) {
                upsertData.datos_originales = orderData.datos_originales;
            }
            const { data: opData, error: opError } = await supabase
                .from('operaciones')
                .upsert(upsertData, { onConflict: 'po' })
                .select()
                .single();

            if (opError) throw opError;

            // Delete existing containers and re-insert
            await supabase.from('contenedores').delete().eq('operacion_id', opData.id);

            if (orderData.contenedores && orderData.contenedores.length > 0) {
                const contenedoresData = orderData.contenedores.map(c => ({
                    operacion_id: opData.id,
                    po: orderData.po,
                    tipo: c.tipo,
                    numero: c.numero,
                    precinto_aduana: c.precinto_aduana,
                    precinto_linea: c.precinto_linea || null,
                    bultos: c.bultos,
                    peso_neto: c.peso_neto,
                    peso_bruto: c.peso_bruto,
                    producto: c.producto || ''
                }));

                const { error: contError } = await supabase.from('contenedores').insert(contenedoresData);
                if (contError) throw contError;
            }

            return opData;
        }

        async function deleteOrderFromSupabase(po) {
            const order = orders[po];
            if (!order || !order.id) return;

            // 1. Borrar contenedores primero (evita fallo por FK sin cascade)
            await supabase.from('contenedores').delete().eq('operacion_id', order.id);

            // 2. Después borrar la operación
            const { error } = await supabase.from('operaciones').delete().eq('id', order.id);
            if (error) throw error;
        }

        async function deleteCurrentOrder() {
            if (!currentOrderId) {
                showAlert('Selecciona una orden primero', 'warning');
                return;
            }
            const order = orders[currentOrderId];
            if (!order) return;

            if (!confirm(`¿Borrar la orden ${currentOrderId}? Esta acción no se puede deshacer.`)) return;

            try {
                showLoading('Borrando...');
                await deleteOrderFromSupabase(currentOrderId);
                delete orders[currentOrderId];
                currentOrderId = null;
                hasUnsavedChanges = false;
                renderOrdersList();
                document.getElementById('panel').innerHTML = '<div class="panel-empty"><span style="font-size:32px;">&#128203;</span>Selecciona una orden o carga un Excel</div>';
                hideLoading();
                showAlert('Orden borrada', 'success');
            } catch (err) {
                hideLoading();
                showAlert('Error al borrar: ' + err.message, 'error');
            }
        }

        // ─── EXCEL PARSING ───
        async function handleExcelUpload(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            showLoading('Procesando Excel...');
            const results = []; // { sheet, status: 'ok'|'error'|'skipped', reason?, po?, containers? }
            const pendingOverrides = []; // orders that already exist as PENDIENTE/RECHAZADO

            try {
                for (const file of files) {
                    const data = new Uint8Array(await file.arrayBuffer());
                    const workbook = XLSX.read(data, { type: 'array' });
                    const isRemision = file.name.toUpperCase().includes('REMISION');
                    const tipoOrigen = isRemision ? 'bahia_blanca' : 'buenos_aires';

                    console.log(`[LOADER] Archivo: ${file.name}, hojas: ${workbook.SheetNames.length}`);

                    for (let sheetIdx = 0; sheetIdx < workbook.SheetNames.length; sheetIdx++) {
                        const sheetName = workbook.SheetNames[sheetIdx];

                        // Check hidden sheets correctly via Workbook metadata
                        const sheetMeta = workbook.Workbook
                            && workbook.Workbook.Sheets
                            && workbook.Workbook.Sheets[sheetIdx];
                        if (sheetMeta && sheetMeta.Hidden && sheetMeta.Hidden !== 0) {
                            results.push({ sheet: sheetName, status: 'skipped', reason: 'Hoja oculta' });
                            continue;
                        }

                        const sheet = workbook.Sheets[sheetName];

                        try {
                            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

                            // Step 0: Detect format
                            const formato = detectExcelFormat(rows);
                            console.log(`[LOADER] Hoja: ${sheetName}, formato: ${formato}`);

                            // Skip summary sheets
                            if (formato === 'intersys') {
                                results.push({ sheet: sheetName, status: 'skipped', reason: 'Hoja de resumen InterSys' });
                                continue;
                            }
                            if (formato === 'expo_planilla') {
                                results.push({ sheet: sheetName, status: 'skipped', reason: 'Hoja de resumen EXPO' });
                                continue;
                            }

                            // Step 1: Parse by format
                            let orderDataList = []; // array of orders (lista_maestra returns multiple)

                            if (formato === 'planilla_aduana') {
                                const result = await parseFormatoPlanillaAduana(rows, tipoOrigen, sheetName);
                                orderDataList = [result];
                            } else if (formato === 'lista_maestra') {
                                const result = parseFormatoListaMaestra(rows, tipoOrigen);
                                orderDataList = Array.isArray(result) ? result : [result];
                            } else {
                                // 'tren' or 'unknown' — use existing parser
                                let orderData = await parseExcelSheet(rows, tipoOrigen, sheetName);

                                // Step 2: If parser failed, try learned patterns
                                if (orderData && orderData.error) {
                                    const parserError = orderData.error;
                                    console.log(`[LOADER] Parser failed: ${parserError}. Trying learned patterns...`);

                                    const learnedPattern = await findLearnedPattern(rows);
                                    if (learnedPattern) {
                                        console.log('[LOADER] Found learned pattern, applying...');
                                        orderData = buildOrderFromAIResult(learnedPattern, rows, tipoOrigen);
                                        if (orderData) {
                                            orderData.warnings = orderData.warnings || [];
                                            orderData.warnings.unshift('Resuelto con patron aprendido');
                                        }
                                    }

                                    // Step 3: If patterns didn't work, call Claude AI
                                    if (!orderData || orderData.error) {
                                        if (await getClaudeApiKey()) {
                                            console.log('[LOADER] Calling Claude AI...');
                                            showLoading(`Analizando con IA: ${sheetName}...`);
                                            const aiResult = await callClaudeForParsing(rows, tipoOrigen);
                                            if (aiResult) {
                                                orderData = buildOrderFromAIResult(aiResult, rows, tipoOrigen);
                                                if (orderData) {
                                                    await saveLearnedPattern(rows, aiResult);
                                                }
                                            }
                                            showLoading('Procesando Excel...');
                                        }
                                    }

                                    if (!orderData) {
                                        const aiNote = (await getClaudeApiKey()) ? ' (IA tampoco pudo)' : ' (sin API key para IA)';
                                        results.push({ sheet: sheetName, status: 'error', reason: parserError + aiNote });
                                        continue;
                                    }
                                }

                                orderDataList = [orderData];
                            }

                            // Step 4: Save results (with protection for existing orders)
                            for (const orderData of orderDataList) {
                                if (orderData && !orderData.error) {
                                    // Attach filename to datos_originales
                                    if (orderData.datos_originales) {
                                        const rawRows = Array.isArray(orderData.datos_originales) ? orderData.datos_originales : (orderData.datos_originales.rows || []);
                                        orderData.datos_originales = { filename: file.name, rows: rawRows };
                                    }

                                    // Check if order already exists
                                    const { data: existing } = await supabase
                                        .from('operaciones')
                                        .select('po, estado, validado_por')
                                        .eq('po', orderData.po)
                                        .single();

                                    if (existing) {
                                        if (existing.estado === 'VALIDADO') {
                                            results.push({
                                                sheet: sheetName,
                                                status: 'skipped',
                                                reason: `Orden ${existing.po} ya VALIDADA por ${existing.validado_por || '?'} — se omitió`
                                            });
                                            continue;
                                        }
                                        if (existing.estado === 'PENDIENTE') {
                                            // Store for potential manual update — don't save automatically
                                            pendingOverrides.push({ orderData, sheetName });
                                            results.push({
                                                sheet: sheetName,
                                                status: 'skipped',
                                                reason: `Orden ${existing.po} ya existe como PENDIENTE — se omitió (recargá si querés actualizar)`
                                            });
                                            continue;
                                        }
                                        if (existing.estado === 'RECHAZADO') {
                                            pendingOverrides.push({ orderData, sheetName });
                                            results.push({
                                                sheet: sheetName,
                                                status: 'skipped',
                                                reason: `Orden ${existing.po} estaba RECHAZADA — se omitió (borrala y recargá si querés resubir)`
                                            });
                                            continue;
                                        }
                                    }

                                    // Order doesn't exist — save normally
                                    await saveOrderToSupabase(orderData);
                                    const hasWarnings = orderData.warnings && orderData.warnings.length > 0;
                                    results.push({
                                        sheet: sheetName,
                                        status: hasWarnings ? 'warning' : 'ok',
                                        po: orderData.po,
                                        containers: orderData.contenedores.length,
                                        warnings: orderData.warnings || []
                                    });
                                } else {
                                    results.push({ sheet: sheetName, status: 'error', reason: (orderData && orderData.error) || 'Sin datos reconocibles' });
                                }
                            }
                        } catch (sheetError) {
                            console.error(`[LOADER] Error en hoja ${sheetName}:`, sheetError);
                            let reason = sheetError.message || String(sheetError);
                            if (reason.includes('unique constraint') && reason.includes('precinto')) {
                                reason = 'Precinto duplicado — posible consolidación. Verificar constraint en Supabase.';
                            }
                            results.push({ sheet: sheetName, status: 'error', reason: 'Error guardando: ' + reason });
                        }
                    }
                }

                await loadOrdersFromSupabase();
                hideLoading();
                showUploadResults(results);

            } catch (error) {
                hideLoading();
                console.error('[LOADER] Error general:', error);
                showAlert('Error al procesar Excel: ' + error.message, 'error');
            }

            // Reset file input so the same file can be re-uploaded
            e.target.value = '';
        }

        function showUploadResults(results) {
            const countOk = results.filter(r => r.status === 'ok' || r.status === 'warning').length;
            const countError = results.filter(r => r.status === 'error').length;
            const countSkipped = results.filter(r => r.status === 'skipped').length;
            const countWarning = results.filter(r => r.status === 'warning').length;

            document.getElementById('resultSummary').innerHTML = `
                <span class="count-ok">${countOk} cargada(s)</span>
                ${countWarning > 0 ? `<span class="count-warning">${countWarning} con alertas</span>` : ''}
                <span class="count-error">${countError} con error</span>
                <span class="count-skipped">${countSkipped} ignorada(s)</span>
            `;

            let tableHtml = `
                <table class="result-table">
                    <thead><tr><th>Hoja</th><th>Estado</th><th>Detalle</th></tr></thead>
                    <tbody>
            `;

            const sorted = [...results].sort((a, b) => {
                const order = { ok: 0, warning: 1, error: 2, skipped: 3 };
                return (order[a.status] || 0) - (order[b.status] || 0);
            });

            for (const r of sorted) {
                const rowClass = (r.status === 'ok') ? 'result-ok'
                    : (r.status === 'warning') ? 'result-warning'
                    : (r.status === 'error') ? 'result-error' : 'result-skipped';
                const statusLabel = (r.status === 'ok') ? 'OK'
                    : (r.status === 'warning') ? 'Alerta'
                    : (r.status === 'error') ? 'Error' : 'Ignorada';
                let detail = '';
                if (r.status === 'ok') {
                    detail = `PO: ${esc(r.po)} (${r.containers} cont.)`;
                } else if (r.status === 'warning') {
                    detail = `PO: ${esc(r.po)} (${r.containers} cont.) — ${r.warnings.map(w => esc(w)).join('; ')}`;
                } else {
                    detail = esc(r.reason || '');
                }
                tableHtml += `<tr class="${rowClass}"><td>${esc(r.sheet)}</td><td>${statusLabel}</td><td>${detail}</td></tr>`;
            }

            tableHtml += '</tbody></table>';
            document.getElementById('resultBody').innerHTML = tableHtml;
            document.getElementById('uploadResultModal').classList.add('show');

            // Persist errors in banner
            uploadErrors = results.filter(r => r.status === 'error');
            renderErrorBanner();
        }

        function renderErrorBanner() {
            const banner = document.getElementById('errorBanner');
            if (!banner) return;
            if (uploadErrors.length === 0) {
                banner.style.display = 'none';
                banner.innerHTML = '';
                return;
            }
            banner.style.display = 'block';
            banner.innerHTML = `
                <div style="background:#fff5f5;border:1px solid #e53e3e;border-radius:5px;padding:8px 10px;margin-bottom:10px;font-size:12px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <strong style="color:#e53e3e;">${uploadErrors.length} hoja(s) con error:</strong>
                        <button onclick="clearErrors()" style="background:none;border:none;color:#e53e3e;cursor:pointer;font-size:14px;">✕</button>
                    </div>
                    ${uploadErrors.map(e => `<div style="color:#742a2a;margin-top:4px;">"${esc(e.sheet)}" — ${esc(e.reason)}</div>`).join('')}
                </div>
            `;
        }

        function clearErrors() {
            uploadErrors = [];
            renderErrorBanner();
        }

        // Helper: extract value after keyword+colon in same cell
        // e.g. extractAfterSeparator("BUQUE:AS SABINE", "BUQUE") → "AS SABINE"
        function extractAfterSeparator(cellText, keyword) {
            const idx = cellText.toUpperCase().indexOf(keyword.toUpperCase());
            if (idx === -1) return '';
            const after = cellText.substring(idx + keyword.length);
            return after.replace(/^[\s:.\-]+/, '').trim();
        }

        // ─── FORMAT DETECTION ───
        function detectExcelFormat(rows) {
            if (!rows || rows.length < 2) return 'unknown';

            const allText = rows.slice(0, 10).flat().map(c => String(c || '').toUpperCase()).join('|');
            const row1 = rows[0] || [];
            const row1Text = row1.map(c => String(c || '').toUpperCase().trim());

            // FORMATO 1 - "Planilla de Aduana": tiene BOLSAS/BOLSONES o SHIPMENT
            if (allText.includes('BOLSA') || allText.includes('SHIPMENT') || allText.includes('TRACTOR')) {
                return 'planilla_aduana';
            }

            // FORMATO 3 - "Lista maestra": primera fila es header con Tipo, Contenedor, Orden y NO tiene DDT arriba
            if (row1Text.some(c => c.includes('TIPO') || c === 'TIPO')
                && row1Text.some(c => c.includes('CONTENEDOR'))
                && row1Text.some(c => c.includes('ORDEN'))
                && !allText.includes('DDT')) {
                return 'lista_maestra';
            }

            // FORMATO 4 - "InterSys"
            if (allText.includes('REF. SECUNDARIA') || allText.includes('DESTINACIÓN') || allText.includes('DESTINACION')) {
                return 'intersys';
            }

            // FORMATO 4 - "EXPO PLANILLA": tiene "Vagon"
            if (row1Text.some(c => c.includes('VAGON'))) {
                return 'expo_planilla';
            }

            // FORMATO 2 - "TREN": tiene DDT y/o OPERACIÓN
            if (allText.includes('DDT') || allText.includes('OPERACI')) {
                return 'tren';
            }

            return 'unknown';
        }

        // ─── FORMATO 1: PLANILLA DE ADUANA ───
        async function parseFormatoPlanillaAduana(rows, tipoOrigen, sheetName) {
            if (!rows || rows.length < 3) return { error: 'Muy pocas filas' };

            let ddt = '', buque = '', destino = '', terminal = '', canal = '';
            let headerRowIdx = -1;
            const warnings = [];

            // Extract header info (primeras 8 filas)
            for (let i = 0; i < Math.min(8, rows.length); i++) {
                const row = rows[i];
                if (!row) continue;
                for (let j = 0; j < row.length; j++) {
                    const cell = String(row[j] || '').trim();
                    const cellUpper = cell.toUpperCase();
                    const nextCell = String(row[j + 1] || '').trim();

                    if (cellUpper.includes('DDT') && !ddt) {
                        const raw = (extractAfterSeparator(cell, 'DDT') || nextCell).replace(/\s/g, '').toUpperCase();
                        if (raw.length >= 14) ddt = raw;
                    }
                    if (cellUpper.includes('BUQUE') && !buque) {
                        const val = extractAfterSeparator(cell, 'BUQUE') || nextCell;
                        if (val && val.length > 2) buque = val;
                    }
                    if (cellUpper.includes('DESTINO') && !destino) {
                        const val = extractAfterSeparator(cell, 'DESTINO') || nextCell;
                        if (val && val.length > 1) destino = val;
                    }
                    if (cellUpper.includes('TERMINAL') && !terminal) {
                        const val = extractAfterSeparator(cell, 'TERMINAL') || nextCell;
                        if (val) terminal = val.replace(/\d+/g, '').replace(/[()]/g, '').trim();
                    }
                    if (cellUpper.includes('CANAL') && !canal) {
                        const val = extractAfterSeparator(cell, 'CANAL') || nextCell;
                        if (val && !val.includes(':')) canal = val;
                    }
                }
            }

            // Find header row
            for (let i = 0; i < Math.min(15, rows.length); i++) {
                const row = rows[i];
                if (!row) continue;
                const rowStr = row.map(r => String(r || '').toUpperCase()).join('|');
                if ((rowStr.includes('CONTENEDOR') || rowStr.includes('CONTAINER'))
                    && (rowStr.includes('PRECINTO') || rowStr.includes('SEAL') || rowStr.includes('ADUANA'))) {
                    headerRowIdx = i;
                    break;
                }
            }

            if (headerRowIdx === -1) return { error: 'No se encontró header de contenedores (Formato Planilla Aduana)' };

            // Map columns dynamically
            const headerRow = rows[headerRowIdx];
            let colMap = { tipo: -1, numero: -1, precAduana: -1, precLinea: -1, producto: -1, bultos: -1, bolsas: -1, pesoNeto: -1, pesoBruto: -1, orden: -1 };

            // First pass: find specific named columns (ADUANA vs NAVIERA)
            for (let j = 0; j < headerRow.length; j++) {
                const h = String(headerRow[j] || '').toUpperCase().trim();
                if (h.includes('TIPO') && colMap.tipo === -1) colMap.tipo = j;
                else if ((h.includes('CONTENEDOR') || h.includes('CONTAINER')) && colMap.numero === -1) colMap.numero = j;
                else if (h.includes('ADUANA') && (h.includes('PRECINTO') || h.includes('SEAL')) && colMap.precAduana === -1) colMap.precAduana = j;
                else if ((h.includes('NAVIERA') || h.includes('LINEA')) && (h.includes('PRECINTO') || h.includes('SEAL')) && colMap.precLinea === -1) colMap.precLinea = j;
                else if (h.includes('PRODUCTO') || h.includes('MERCADER')) colMap.producto = j;
                else if (h.includes('BOLSA') || h.includes('BOLSON')) colMap.bolsas = j;
                else if ((h.includes('BULTO') || h === 'BAGS') && colMap.bultos === -1) colMap.bultos = j;
                else if (h.includes('NETO') || h === 'NET') colMap.pesoNeto = j;
                else if (h.includes('BRUTO') || h === 'GROSS') colMap.pesoBruto = j;
                else if (h.includes('ORDEN') || h === 'PO') colMap.orden = j;
            }
            // Second pass: if precAduana not found by name, use first generic PRECINTO
            if (colMap.precAduana === -1) {
                for (let j = 0; j < headerRow.length; j++) {
                    const h = String(headerRow[j] || '').toUpperCase().trim();
                    if ((h.includes('PRECINTO') || h.includes('SEAL')) && j !== colMap.precLinea) {
                        colMap.precAduana = j;
                        break;
                    }
                }
            }

            console.log('[PARSER-F1] Column map:', JSON.stringify(colMap));

            // Parse data rows
            const contenedores = [];
            let currentPO = '';
            let lastValid = null; // { tipo, numero, precinto_aduana }

            for (let i = headerRowIdx + 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length < 2) continue;

                // Get PO from ORDEN column if available
                const rowPO = colMap.orden >= 0 ? String(row[colMap.orden] || '').trim() : '';
                if (rowPO && /^\d{9,10}$/.test(rowPO)) currentPO = rowPO;

                let numero = colMap.numero >= 0 ? String(row[colMap.numero] || '').trim().replace(/[-\s]/g, '') : '';
                const precAduana = colMap.precAduana >= 0 ? String(row[colMap.precAduana] || '').trim().replace(/[_\s]/g, '').toUpperCase() : '';
                const tipo = standardizeContainerType(colMap.tipo >= 0 ? String(row[colMap.tipo] || '') : '');
                const precLinea = colMap.precLinea >= 0 ? String(row[colMap.precLinea] || '').trim().replace(/[_\s]/g, '').toUpperCase() : '';
                const producto = colMap.producto >= 0 ? String(row[colMap.producto] || '').trim() : '';
                const bultos = colMap.bultos >= 0 ? (parseFloat(row[colMap.bultos]) || 0) : 0;
                const pesoNeto = colMap.pesoNeto >= 0 ? (parseFloat(row[colMap.pesoNeto]) || 0) : 0;
                const pesoBruto = colMap.pesoBruto >= 0 ? (parseFloat(row[colMap.pesoBruto]) || 0) : 0;

                // CASO 1: Fila tiene número de contenedor válido → contenedor nuevo
                if (numero.length === 11) {
                    lastValid = {
                        tipo: tipo || (lastValid ? lastValid.tipo : ''),
                        numero: numero,
                        precinto_aduana: (precAduana && precAduana.length >= 5) ? precAduana : (lastValid ? lastValid.precinto_aduana : '')
                    };

                    if (pesoNeto === 0 && pesoBruto === 0 && bultos === 0) continue;

                    contenedores.push({
                        tipo: lastValid.tipo,
                        numero: lastValid.numero,
                        precinto_aduana: lastValid.precinto_aduana,
                        precinto_linea: precLinea || null,
                        producto,
                        bultos: Math.round(bultos),
                        peso_neto: Math.round(pesoNeto),
                        peso_bruto: Math.round(pesoBruto)
                    });
                    continue;
                }

                // CASO 2: Sin contenedor pero CON producto y datos numéricos → otro producto del mismo contenedor
                if (lastValid && producto && producto.length > 0 && (bultos > 0 || pesoNeto > 0)) {
                    console.log(`[PARSER-F1] CASO 2 HIT: fila ${i+1}, producto="${producto}", bultos=${bultos}, neto=${pesoNeto}, contenedor=${lastValid.numero}`);
                    contenedores.push({
                        tipo: lastValid.tipo,
                        numero: lastValid.numero,
                        precinto_aduana: lastValid.precinto_aduana,
                        precinto_linea: null,
                        producto,
                        bultos: Math.round(bultos),
                        peso_neto: Math.round(pesoNeto),
                        peso_bruto: Math.round(pesoBruto)
                    });
                    warnings.push(`Múltiples productos en contenedor ${lastValid.numero}`);
                    continue;
                }

                // CASO 3: Sin contenedor, sin producto → fila de totales, ignorar
                if (numero.length !== 11) {
                    console.log(`[PARSER-F1] CASO 3 (skip): fila ${i+1}, numero="${numero}"(${numero.length}), producto="${producto}"(${producto.length}), bultos=${bultos}, neto=${pesoNeto}, lastValid=${lastValid ? lastValid.numero : 'null'}`);
                }
            }

            // --- FALLBACK IA: verificar si el parser perdió datos ---
            let excelTotalBultos = 0;
            for (let i = headerRowIdx + 1; i < Math.min(headerRowIdx + 50, rows.length); i++) {
                const row = rows[i];
                if (!row) continue;
                const rowProducto = colMap.producto >= 0 ? String(row[colMap.producto] || '').trim() : '';
                const rowBultos = colMap.bultos >= 0 ? (parseFloat(row[colMap.bultos]) || 0) : 0;
                const rowNumero = colMap.numero >= 0 ? String(row[colMap.numero] || '').trim().replace(/[-\s]/g, '') : '';
                if (rowBultos > 0 && rowNumero.length !== 11 && !rowProducto) {
                    excelTotalBultos = Math.round(rowBultos);
                    break;
                }
            }
            const parsedTotalBultos = contenedores.reduce((s, c) => s + c.bultos, 0);
            if (excelTotalBultos > 0 && parsedTotalBultos > 0 && excelTotalBultos !== parsedTotalBultos) {
                console.warn(`[PARSER-F1] Totales no coinciden: parseado=${parsedTotalBultos}, Excel=${excelTotalBultos}. Intentando con IA...`);
                const apiKey = await getClaudeApiKey();
                if (apiKey) {
                    try {
                        const aiResult = await callClaudeForParsing(rows, tipoOrigen);
                        if (aiResult) {
                            const aiOrder = buildOrderFromAIResult(aiResult, rows, tipoOrigen);
                            if (aiOrder && aiOrder.contenedores && aiOrder.contenedores.length > contenedores.length) {
                                console.log(`[PARSER-F1] IA encontró ${aiOrder.contenedores.length} items vs parser ${contenedores.length}. Usando IA.`);
                                contenedores.length = 0;
                                contenedores.push(...aiOrder.contenedores);
                                warnings.push('Datos completados con asistencia de IA (multi-producto detectado)');
                            }
                        }
                    } catch (aiErr) {
                        console.error('[PARSER-F1] IA fallback error:', aiErr);
                        warnings.push('No se pudo verificar multi-producto con IA: ' + aiErr.message);
                    }
                } else {
                    warnings.push('Totales no coinciden (parseado: ' + parsedTotalBultos + ', Excel: ' + excelTotalBultos + '). Sin API key para verificar con IA.');
                }
            }

            if (contenedores.length === 0) return { error: 'No se encontraron contenedores válidos (Formato Planilla Aduana)' };

            // Fallback: PO desde nombre de hoja
            if ((!currentPO || currentPO.length < 9) && sheetName) {
                const sheetPOMatch = sheetName.match(/(\d{9,10})/);
                if (sheetPOMatch) {
                    currentPO = sheetPOMatch[1];
                    warnings.push('PO tomado del nombre de la hoja "' + sheetName + '" (OPERACIÓN vacía en el Excel)');
                }
            }

            if (!currentPO) return { error: 'PO no encontrado en columna ORDEN (Formato Planilla Aduana)' };

            if (!ddt) {
                ddt = 'REVISAR-' + currentPO;
                warnings.push('DDT no encontrado — revisar manualmente');
            }

            const productos = [...new Set(contenedores.map(c => c.producto).filter(p => p))];
            if (productos.length > 1) warnings.push('Múltiples productos: ' + productos.join(', '));

            const lastDataRow = headerRowIdx + contenedores.length + 10;
            const datos_originales = rows.slice(0, Math.min(lastDataRow, rows.length));

            return {
                po: currentPO.trim(),
                ddt: ddt.trim(),
                buque: buque.trim(),
                destino: destino.trim(),
                terminal: terminal.trim(),
                canal: canal.trim(),
                tipo_origen: tipoOrigen,
                estado: 'PENDIENTE',
                cantidad_contenedores: contenedores.length,
                total_bultos: contenedores.reduce((s, c) => s + c.bultos, 0),
                total_peso_neto: contenedores.reduce((s, c) => s + c.peso_neto, 0),
                total_peso_bruto: contenedores.reduce((s, c) => s + c.peso_bruto, 0),
                contenedores,
                datos_originales,
                warnings
            };
        }

        // ─── FORMATO 3: LISTA MAESTRA ───
        function parseFormatoListaMaestra(rows, tipoOrigen) {
            if (!rows || rows.length < 2) return [];

            const headerRow = rows[0];
            let colMap = { tipo: -1, numero: -1, precinto: -1, orden: -1, peso: -1, buque: -1, destino: -1, terminal: -1 };

            for (let j = 0; j < headerRow.length; j++) {
                const h = String(headerRow[j] || '').toUpperCase().trim();
                if (h.includes('TIPO') && colMap.tipo === -1) colMap.tipo = j;
                else if (h.includes('CONTENEDOR') && colMap.numero === -1) colMap.numero = j;
                else if (h.includes('PRECINTO') && colMap.precinto === -1) colMap.precinto = j;
                else if (h.includes('ORDEN') && colMap.orden === -1) colMap.orden = j;
                else if (h.includes('PESO') && colMap.peso === -1) colMap.peso = j;
                else if (h.includes('BUQUE') && colMap.buque === -1) colMap.buque = j;
                else if (h.includes('DESTINO') && colMap.destino === -1) colMap.destino = j;
                else if (h.includes('TERMINAL') && colMap.terminal === -1) colMap.terminal = j;
            }

            console.log('[PARSER-F3] Column map:', JSON.stringify(colMap));

            if (colMap.orden === -1 || colMap.numero === -1) {
                return [{ error: 'Lista maestra sin columnas Orden/Contenedor' }];
            }

            // Group rows by PO
            const groups = {};
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row) continue;
                const po = String(row[colMap.orden] || '').trim();
                if (!po || !/^\d{7,10}$/.test(po)) continue;
                if (!groups[po]) groups[po] = [];
                groups[po].push(row);
            }

            const ordersArr = [];
            for (const [po, groupRows] of Object.entries(groups)) {
                const contenedores = [];
                let buque = '', destino = '', terminal = '';

                for (const row of groupRows) {
                    const numero = String(row[colMap.numero] || '').trim().replace(/[-\s]/g, '');
                    if (numero.length !== 11) continue;

                    const tipo = standardizeContainerType(colMap.tipo >= 0 ? String(row[colMap.tipo] || '') : '');
                    let precinto = colMap.precinto >= 0 ? String(row[colMap.precinto] || '').trim().replace(/[_\s]/g, '').toUpperCase() : '';
                    const pesoRaw = colMap.peso >= 0 ? parseFloat(row[colMap.peso]) : 0;
                    const peso = isNaN(pesoRaw) ? 0 : Math.round(pesoRaw);

                    if (!buque && colMap.buque >= 0) buque = String(row[colMap.buque] || '').trim();
                    if (!destino && colMap.destino >= 0) destino = String(row[colMap.destino] || '').trim();
                    if (!terminal && colMap.terminal >= 0) terminal = String(row[colMap.terminal] || '').trim();

                    contenedores.push({
                        tipo,
                        numero,
                        precinto_aduana: precinto,
                        precinto_linea: null,
                        producto: '',
                        bultos: 0,
                        peso_neto: peso,
                        peso_bruto: peso
                    });
                }

                if (contenedores.length === 0) continue;

                ordersArr.push({
                    po,
                    ddt: 'REVISAR-' + po,
                    buque,
                    destino,
                    terminal: terminal.replace(/\d+/g, '').replace(/[()]/g, '').trim(),
                    canal: '',
                    tipo_origen: tipoOrigen,
                    estado: 'PENDIENTE',
                    cantidad_contenedores: contenedores.length,
                    total_bultos: 0,
                    total_peso_neto: contenedores.reduce((s, c) => s + c.peso_neto, 0),
                    total_peso_bruto: contenedores.reduce((s, c) => s + c.peso_bruto, 0),
                    contenedores,
                    datos_originales: rows.slice(0, Math.min(rows.length, 30)),
                    warnings: ['Datos incompletos — cargado desde lista maestra', 'DDT no disponible — revisar manualmente']
                });
            }

            return ordersArr;
        }

        // ─── FORMATO 2: TREN (parser existente mejorado) ───
        async function parseExcelSheet(rows, tipoOrigen, sheetName) {
            if (!rows || rows.length < 3) return { error: 'Muy pocas filas (' + (rows ? rows.length : 0) + ')' };

            let ddt = '', po = '', buque = '', destino = '', terminal = '', canal = '';
            let headerRowIdx = -1;
            const warnings = [];

            // ─── EXTRACT HEADER INFO (first 25 rows) ───
            for (let i = 0; i < Math.min(25, rows.length); i++) {
                const row = rows[i];
                if (!row) continue;

                for (let j = 0; j < row.length; j++) {
                    const cell = String(row[j] || '').trim();
                    const cellUpper = cell.toUpperCase();
                    const nextCell = String(row[j + 1] || '').trim();

                    // DDT — strip ALL spaces before matching
                    if (cellUpper.includes('DDT') && !ddt) {
                        const cellNoSpaces = cell.replace(/\s/g, '');
                        const nextNoSpaces = nextCell.replace(/\s/g, '');
                        const match = cellNoSpaces.match(/(\d{5}[A-Z]{2}\d{8}[A-Z])/i);
                        if (match) {
                            ddt = match[1].toUpperCase();
                        } else if (nextNoSpaces.match(/^\d{5}[A-Z]{2}\d{8}[A-Z]$/i)) {
                            ddt = nextNoSpaces.toUpperCase();
                        } else {
                            // Fallback: take whatever is after "DDT" and clean it
                            let rawDdt = extractAfterSeparator(cell, 'DDT') || nextCell;
                            rawDdt = rawDdt.replace(/\s/g, '').toUpperCase();
                            if (rawDdt.length >= 14) ddt = rawDdt;
                        }
                    }

                    // PO / Operacion / Orden
                    if ((cellUpper.includes('OPERACI') || cellUpper.includes('ORDEN') || cellUpper === 'PO') && !po) {
                        const match = cell.match(/(\d{9,10})/);
                        if (match) {
                            po = match[1];
                        } else if (/^\d{9,10}$/.test(nextCell)) {
                            po = nextCell;
                        }
                    }

                    // Buque — same cell (e.g. "BUQUE:AS SABINE") then next cell
                    if (cellUpper.includes('BUQUE') && !buque) {
                        const sameCell = extractAfterSeparator(cell, 'BUQUE');
                        if (sameCell && sameCell.length > 2) {
                            buque = sameCell;
                        } else if (nextCell && nextCell.length > 2) {
                            buque = nextCell;
                        }
                    }

                    // Destino — same cell then next cell
                    if (cellUpper.includes('DESTINO') && !destino) {
                        const sameCell = extractAfterSeparator(cell, 'DESTINO');
                        if (sameCell && sameCell.length > 1) {
                            destino = sameCell;
                        } else if (nextCell && nextCell.length > 1) {
                            destino = nextCell;
                        }
                    }

                    // Terminal — same cell then next cell (also accept "ADUANA" as synonym)
                    if ((cellUpper.includes('TERMINAL') || cellUpper.includes('ADUANA')) && !terminal && !cellUpper.includes('PRECINTO')) {
                        const kw = cellUpper.includes('TERMINAL') ? 'TERMINAL' : 'ADUANA';
                        const sameCell = extractAfterSeparator(cell, kw);
                        const val = (sameCell && sameCell.length > 0) ? sameCell : nextCell;
                        if (val && val.length > 0) {
                            terminal = val.replace(/\d+/g, '').replace(/[()]/g, '').trim();
                        }
                    }

                    // Canal — same cell then next cell
                    if (cellUpper.includes('CANAL') && !canal) {
                        const sameCell = extractAfterSeparator(cell, 'CANAL');
                        if (sameCell && sameCell.length > 0 && !sameCell.includes(':')) {
                            canal = sameCell;
                        } else if (nextCell && nextCell.length > 0 && !nextCell.includes(':')) {
                            canal = nextCell;
                        }
                    }
                }
            }

            // ─── VALIDATE — be lenient with DDT, don't reject ───
            // Fallback: PO desde nombre de hoja
            if ((!po || po.length < 9) && sheetName) {
                const sheetPOMatch = sheetName.match(/(\d{9,10})/);
                if (sheetPOMatch) {
                    po = sheetPOMatch[1];
                    warnings.push('PO tomado del nombre de la hoja "' + sheetName + '" (OPERACIÓN vacía en el Excel)');
                }
            }
            if (!po || po.length < 9) return { error: 'PO no encontrado o inválido' + (po ? ` ("${po}")` : '') };

            if (!ddt) {
                ddt = 'REVISAR-' + po;
                warnings.push('DDT no encontrado — revisar manualmente');
            } else if (ddt.length !== 16) {
                warnings.push('DDT posiblemente inválido (' + ddt.length + ' chars): ' + ddt);
            }

            // ─── FIND HEADER ROW (dynamic column detection) ───
            for (let i = 0; i < Math.min(30, rows.length); i++) {
                const row = rows[i];
                if (!row) continue;
                const rowStr = row.map(r => String(r || '').toUpperCase()).join('|');
                if (rowStr.includes('CONTENEDOR') && (rowStr.includes('PRECINTO') || rowStr.includes('SEAL'))) {
                    headerRowIdx = i;
                    break;
                }
            }

            if (headerRowIdx === -1) return { error: 'No se encontró header de contenedores (CONTENEDOR + PRECINTO)' };

            // ─── MAP COLUMNS FROM HEADER ───
            const headerRow = rows[headerRowIdx];
            let colMap = { tipo: -1, numero: -1, precAduana: -1, precLinea: -1, producto: -1, bultos: -1, pesoNeto: -1, pesoBruto: -1 };

            for (let j = 0; j < headerRow.length; j++) {
                const h = String(headerRow[j] || '').toUpperCase().trim();

                if (h.includes('TIPO') && colMap.tipo === -1) colMap.tipo = j;
                else if ((h.includes('CONTENEDOR') || h.includes('NUMERO') || h.includes('CONTAINER')) && colMap.numero === -1) colMap.numero = j;
                else if (h.includes('PRECINTO') || h.includes('SEAL')) {
                    if (colMap.precAduana === -1) colMap.precAduana = j;
                    else if (colMap.precLinea === -1) colMap.precLinea = j;
                }
                else if (h.includes('PRODUCTO') || h.includes('MERCADER')) colMap.producto = j;
                else if (h.includes('BULTO') || h.includes('BOLSA') || h === 'BAGS') colMap.bultos = j;
                else if (h.includes('NETO') || h === 'NET') colMap.pesoNeto = j;
                else if (h.includes('BRUTO') || h === 'GROSS') colMap.pesoBruto = j;
            }

            console.log(`[PARSER] Column map for PO ${po}:`, JSON.stringify(colMap));

            // Fallback: if key columns not found, try positional
            if (colMap.numero === -1 || colMap.precAduana === -1) {
                console.warn('[PARSER] Could not detect columns from header, using positional fallback');
                colMap = { tipo: 0, numero: 1, precAduana: 2, precLinea: -1, producto: 3, bultos: 4, pesoNeto: 5, pesoBruto: 6 };
            }

            // ─── PARSE CONTAINER ROWS ───
            const contenedores = [];
            let lastValid = null; // { tipo, numero, precinto_aduana }

            for (let i = headerRowIdx + 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length < 3) continue;

                let numero = colMap.numero >= 0 ? String(row[colMap.numero] || '').trim() : '';
                numero = numero.replace(/[-\s]/g, '');

                let precAduana = colMap.precAduana >= 0 ? String(row[colMap.precAduana] || '').trim() : '';
                precAduana = precAduana.replace(/[_\s]/g, '').toUpperCase();

                const tipo = standardizeContainerType(colMap.tipo >= 0 ? String(row[colMap.tipo] || '') : '');
                const precLinea = colMap.precLinea >= 0 ? String(row[colMap.precLinea] || '').trim().replace(/[_\s]/g, '').toUpperCase() : '';
                const producto = colMap.producto >= 0 ? String(row[colMap.producto] || '').trim() : '';

                const bultos = colMap.bultos >= 0 ? (parseFloat(row[colMap.bultos]) || 0) : 0;
                const pesoNeto = colMap.pesoNeto >= 0 ? (parseFloat(row[colMap.pesoNeto]) || 0) : 0;
                const pesoBruto = colMap.pesoBruto >= 0 ? (parseFloat(row[colMap.pesoBruto]) || 0) : 0;

                // CASO 1: Fila con contenedor válido
                if (numero.length === 11) {
                    if (!precAduana || precAduana.startsWith('=') || precAduana.length < 6) {
                        // Container without precinto — track it but skip if no data
                        lastValid = { tipo, numero, precinto_aduana: '' };
                        continue;
                    }

                    lastValid = { tipo, numero, precinto_aduana: precAduana };

                    if (pesoNeto === 0 && pesoBruto === 0 && bultos === 0) continue;

                    const bultosSospechoso = Math.round(bultos) > 250;
                    if (bultosSospechoso) {
                        warnings.push(`Contenedor ${numero}: bultos=${Math.round(bultos)} parece incorrecto (>250)`);
                    }

                    contenedores.push({
                        tipo,
                        numero,
                        precinto_aduana: precAduana,
                        precinto_linea: precLinea || null,
                        producto,
                        bultos: Math.round(bultos),
                        peso_neto: Math.round(pesoNeto),
                        peso_bruto: Math.round(pesoBruto),
                        bultos_sospechoso: bultosSospechoso
                    });
                    continue;
                }

                // CASO 2: Sin contenedor, CON producto y datos → otro producto del mismo contenedor
                if (lastValid && producto && producto.length > 0 && (bultos > 0 || pesoNeto > 0)) {
                    console.log(`[PARSER-F2] CASO 2 HIT: fila ${i+1}, producto="${producto}", bultos=${bultos}, contenedor=${lastValid.numero}`);
                    contenedores.push({
                        tipo: lastValid.tipo,
                        numero: lastValid.numero,
                        precinto_aduana: lastValid.precinto_aduana,
                        precinto_linea: null,
                        producto,
                        bultos: Math.round(bultos),
                        peso_neto: Math.round(pesoNeto),
                        peso_bruto: Math.round(pesoBruto)
                    });
                    warnings.push(`Múltiples productos en contenedor ${lastValid.numero}`);
                    continue;
                }

                // CASO 3: Sin contenedor, sin producto → fila de totales, ignorar
                if (numero.length !== 11) {
                    console.log(`[PARSER-F2] CASO 3 (skip): fila ${i+1}, numero="${numero}"(${numero.length}), producto="${producto}"(${producto.length}), bultos=${bultos}, neto=${pesoNeto}, lastValid=${lastValid ? lastValid.numero : 'null'}`);
                }
            }

            // --- FALLBACK IA: verificar si el parser perdió datos ---
            let excelTotalBultos = 0;
            for (let i = headerRowIdx + 1; i < Math.min(headerRowIdx + 50, rows.length); i++) {
                const row = rows[i];
                if (!row) continue;
                const rowProducto = colMap.producto >= 0 ? String(row[colMap.producto] || '').trim() : '';
                const rowBultos = colMap.bultos >= 0 ? (parseFloat(row[colMap.bultos]) || 0) : 0;
                const rowNumero = colMap.numero >= 0 ? String(row[colMap.numero] || '').trim().replace(/[-\s]/g, '') : '';
                if (rowBultos > 0 && rowNumero.length !== 11 && !rowProducto) {
                    excelTotalBultos = Math.round(rowBultos);
                    break;
                }
            }
            const parsedTotalBultos = contenedores.reduce((s, c) => s + c.bultos, 0);
            if (excelTotalBultos > 0 && parsedTotalBultos > 0 && excelTotalBultos !== parsedTotalBultos) {
                console.warn(`[PARSER-F2] Totales no coinciden: parseado=${parsedTotalBultos}, Excel=${excelTotalBultos}. Intentando con IA...`);
                const apiKey = await getClaudeApiKey();
                if (apiKey) {
                    try {
                        const aiResult = await callClaudeForParsing(rows, tipoOrigen);
                        if (aiResult) {
                            const aiOrder = buildOrderFromAIResult(aiResult, rows, tipoOrigen);
                            if (aiOrder && aiOrder.contenedores && aiOrder.contenedores.length > contenedores.length) {
                                console.log(`[PARSER] IA encontró ${aiOrder.contenedores.length} items vs parser ${contenedores.length}. Usando IA.`);
                                contenedores.length = 0;
                                contenedores.push(...aiOrder.contenedores);
                                warnings.push('Datos completados con asistencia de IA (multi-producto detectado)');
                            }
                        }
                    } catch (aiErr) {
                        console.error('[PARSER] IA fallback error:', aiErr);
                        warnings.push('No se pudo verificar multi-producto con IA: ' + aiErr.message);
                    }
                } else {
                    warnings.push('Totales no coinciden (parseado: ' + parsedTotalBultos + ', Excel: ' + excelTotalBultos + '). Sin API key para verificar con IA.');
                }
            }

            if (contenedores.length === 0) return { error: 'No se encontraron contenedores válidos (PO: ' + po + ')' };

            // Check multiple products
            const productos = [...new Set(contenedores.map(c => c.producto).filter(p => p))];
            if (productos.length > 1) {
                warnings.push('Múltiples productos: ' + productos.join(', '));
            }

            // Save raw rows for original data view (up to last container row + 2)
            const lastDataRow = headerRowIdx + contenedores.length + 10;
            const datos_originales = rows.slice(0, Math.min(lastDataRow, rows.length));

            return {
                po: po.trim(),
                ddt: ddt.trim(),
                buque: buque.trim(),
                destino: destino.trim(),
                terminal: terminal.trim(),
                canal: canal.trim(),
                tipo_origen: tipoOrigen,
                estado: 'PENDIENTE',
                cantidad_contenedores: contenedores.length,
                total_bultos: contenedores.reduce((s, c) => s + c.bultos, 0),
                total_peso_neto: contenedores.reduce((s, c) => s + c.peso_neto, 0),
                total_peso_bruto: contenedores.reduce((s, c) => s + c.peso_bruto, 0),
                contenedores,
                datos_originales,
                warnings
            };
        }

        // ─── ORDERS LIST ───
        function renderOrdersList(filter = '') {
            const list = document.getElementById('ordersList');
            list.innerHTML = '';
            const filterLower = filter.toLowerCase();

            const allOrders = Object.values(orders);
            const matchesFilter = (o) => {
                if (!filterLower) return true;
                return o.po.includes(filterLower)
                    || (o.ddt || '').toLowerCase().includes(filterLower)
                    || (o.buque || '').toLowerCase().includes(filterLower)
                    || (o.destino || '').toLowerCase().includes(filterLower);
            };

            // Pendientes
            const pending = allOrders
                .filter(o => o.estado === 'PENDIENTE' && matchesFilter(o))
                .sort((a, b) => parseInt(b.po) - parseInt(a.po));

            const pendingLabel = document.createElement('li');
            pendingLabel.style.cssText = 'color:#a0aec0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:8px 4px 4px;';
            pendingLabel.textContent = `PENDIENTES (${pending.length})`;
            list.appendChild(pendingLabel);

            if (pending.length === 0) {
                const empty = document.createElement('li');
                empty.style.cssText = 'color:#68d391;text-align:center;padding:14px;font-size:13px;';
                empty.textContent = 'No hay órdenes pendientes';
                list.appendChild(empty);
            } else {
                pending.forEach(order => list.appendChild(createOrderItem(order)));
            }

            // Recientes (validadas esta sesión)
            const recentOrders = recentlyValidated
                .map(po => orders[po])
                .filter(o => o && matchesFilter(o));

            if (recentOrders.length > 0) {
                const recentLabel = document.createElement('li');
                recentLabel.style.cssText = 'color:#a0aec0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:12px 4px 4px;border-top:1px solid #4a5568;margin-top:8px;';
                recentLabel.textContent = 'RECIENTES (esta sesión)';
                list.appendChild(recentLabel);
                recentOrders.forEach(order => list.appendChild(createOrderItem(order)));
            }
        }

        function createOrderItem(order) {
            const li = document.createElement('li');
            li.className = 'order-item';
            if (currentOrderId === order.po) li.classList.add('active');
            const statusClass = order.estado === 'VALIDADO' ? 'validado'
                : order.estado === 'RECHAZADO' ? 'rechazado' : 'pending';
            li.innerHTML = `
                <div style="flex:1;cursor:pointer;" onclick="selectOrder('${order.po}')">
                    <div>${order.po}</div>
                    <div class="order-info-line">${order.buque || ''} - ${order.cantidad_contenedores || 0} cont.</div>
                </div>
                <span class="status-badge ${statusClass}">${order.estado}</span>
            `;
            return li;
        }

        function filterOrders() {
            const query = document.getElementById('searchInput').value.trim();
            renderOrdersList(query);
        }

        function selectOrder(poId) {
            if (hasUnsavedChanges && currentOrderId !== poId) {
                if (!confirm('Hay cambios sin guardar. ¿Deseas continuar?')) return;
            }
            currentOrderId = poId;
            hasUnsavedChanges = false;
            renderOrderPanel(orders[poId]);
            renderOrdersList(document.getElementById('searchInput').value.trim());
        }

                    <td><input type="text" data-field="precinto_linea" value="${esc(cont.precinto_linea || '')}" ${isEditable ? '' : 'readonly'}></td>

            const totalNeto = order.contenedores.reduce((s, c) => s + (c.peso_neto || 0), 0);
            const totalBruto = order.contenedores.reduce((s, c) => s + (c.peso_bruto || 0), 0);

            panel.innerHTML = `

                    </div>
                    <div class="info-field">
                        <span class="info-label">Buque:</span>
                        <input type="text" class="info-input" id="field_buque" value="${esc(order.buque)}" ${isEditable ? '' : 'readonly'}>
                    </div>
                    <div class="info-field">
                        <span class="info-label">Destino:</span>
                        <input type="text" class="info-input" id="field_destino" value="${esc(order.destino)}" ${isEditable ? '' : 'readonly'}>
                    </div>
                    <div class="info-field">
                        <span class="info-label">Terminal:</span>
                        <input type="text" class="info-input" id="field_terminal" value="${esc(order.terminal)}" ${isEditable ? '' : 'readonly'}>
                    </div>
                </div>

                ${order.estado === 'RECHAZADO' && order.motivo_rechazo ? `
                    <div style="background:#fff5f5;border:1px solid #e53e3e;border-radius:5px;padding:10px;margin-bottom:10px;font-size:13px;">
                        <strong style="color:#e53e3e;">Motivo de rechazo:</strong> ${esc(order.motivo_rechazo)}
                    </div>
                ` : ''}

                ${order.estado === 'VALIDADO' ? `
                    <div style="background:#f0fff4;border:1px solid #38a169;border-radius:5px;padding:10px;margin-bottom:10px;font-size:13px;">
                        <strong style="color:#38a169;">Validado por:</strong> ${esc(order.validado_por || '')}
                        ${order.fecha_validacion ? ` - ${new Date(order.fecha_validacion).toLocaleString('es-AR')}` : ''}
                    </div>
                ` : ''}

                ${multiProducto ? `
                    <div style="background:#fffff0;border:1px solid #d69e2e;border-radius:5px;padding:10px;margin-bottom:10px;font-size:13px;">
                        <strong style="color:#d69e2e;">Alerta:</strong> Esta orden tiene más de un producto: ${productos.map(p => esc(p)).join(', ')}
                    </div>
                ` : ''}

                ${ddtBad ? `
                    <div style="background:#fff5f5;border:1px solid #e53e3e;border-radius:5px;padding:10px;margin-bottom:10px;font-size:13px;">
                        <strong style="color:#e53e3e;">DDT requiere revisión:</strong> ${esc(order.ddt)}
                    </div>

                <div class="section-title">
                    CONTENEDORES (${order.contenedores.length})
                    ${isEditable ? '<button class="btn-icon-add" onclick="addContainer()">+</button>' : ''}
                </div>

                <div class="table-container">
                    <table id="containerTable">
                        <thead>
                            <tr>
                                <th style="width:7%">Tipo</th>
                                <th style="width:13%">Contenedor</th>
                                <th style="width:11%">P. Aduana</th>

                                <th style="width:4%"></th>

                            ${contRows}
                        </tbody>
                        <tfoot>
                            <tr class="totals-row">
                                <td colspan="4" style="text-align:right;padding-right:12px;font-weight:700;">TOTALES</td>
                                <td id="totalBultos">${totalBultos}</td>
                                <td id="totalNeto">${totalNeto}</td>
                                <td id="totalBruto">${totalBruto}</td>

                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>

                <div class="summary-row">
                    <div class="summary-cell">
                        <div class="summary-label">Contenedores</div>
                        <div class="summary-value">${order.contenedores.length}</div>
                    </div>

                        <div class="summary-label">Total Bultos</div>
                        <div class="summary-value" id="summaryBultos">${totalBultos}</div>
                    </div>
                    <div class="summary-cell">
                        <div class="summary-label">Peso Neto</div>
                        <div class="summary-value" id="summaryNeto">${totalNeto.toLocaleString('es-AR')}</div>

                        <div class="summary-label">Peso Bruto</div>

            // Attach change listeners to all inputs
            if (isEditable) {

                        recalcTotals();

        }

        function renderExcelTable(datosInput) {
            // Support both old format (array) and new format ({filename, rows})
            const datos = Array.isArray(datosInput) ? datosInput : (datosInput && datosInput.rows ? datosInput.rows : []);
            if (!datos || datos.length === 0) return '';
            const maxRows = Math.min(datos.length, 30);
            // Find max columns (up to 15)
            let maxCols = 0;
            for (let i = 0; i < maxRows; i++) {
                const row = datos[i];
                if (Array.isArray(row)) maxCols = Math.max(maxCols, row.length);
            }
            maxCols = Math.min(maxCols, 15);

            const keywords = ['DDT', 'OPERACI', 'ORDEN', 'BUQUE', 'DESTINO', 'TERMINAL', 'CANAL', 'CONTENEDOR', 'PRECINTO', 'BULTO', 'NETO', 'BRUTO', 'PRODUCTO', 'TIPO'];

            // Detect header row (containers)
            let headerIdx = -1;
            for (let i = 0; i < maxRows; i++) {
                const row = datos[i];
                if (!Array.isArray(row)) continue;
                const rowStr = row.map(c => String(c || '').toUpperCase()).join('|');
                if (rowStr.includes('CONTENEDOR') && (rowStr.includes('PRECINTO') || rowStr.includes('SEAL'))) {
                    headerIdx = i;
                    break;
                }
            }

            // Column letters
            let colHeaders = '<th></th>';
            for (let j = 0; j < maxCols; j++) {
                colHeaders += `<th>${String.fromCharCode(65 + j)}</th>`;
            }

            let rowsHtml = '';
            for (let i = 0; i < maxRows; i++) {
                const row = Array.isArray(datos[i]) ? datos[i] : [];
                const isHeader = (i === headerIdx);
                rowsHtml += '<tr>';
                rowsHtml += `<td class="row-num ${isHeader ? 'header-highlight' : ''}">${i + 1}</td>`;
                for (let j = 0; j < maxCols; j++) {
                    const val = String(row[j] || '');
                    const upper = val.toUpperCase();
                    const hasKw = keywords.some(kw => upper.includes(kw));
                    const cls = (isHeader ? ' header-highlight' : '') + (hasKw ? ' kw-bold' : '');
                    rowsHtml += `<td class="${cls.trim()}">${esc(val)}</td>`;
                }
                rowsHtml += '</tr>';
            }

            return `<div class="excel-table-container">
                <table class="excel-table">
                    <thead><tr>${colHeaders}</tr></thead>
                    <tbody>${rowsHtml}</tbody>
                </table>
            </div>`;
        }

        function recalcTotals() {
            const rows = document.querySelectorAll('#containerBody tr');

        // ─── AI-ASSISTED PARSING ───

        // Call Claude API to extract order data from raw Excel rows
        async function callClaudeForParsing(rows, tipoOrigen) {
            const apiKey = await getClaudeApiKey();
            if (!apiKey) return null;

            // Build a text representation of the first 35 rows
            const textRows = rows.slice(0, 35).map((row, i) =>
                `Fila ${i + 1}: ${(Array.isArray(row) ? row : []).map((c, j) => `[${String.fromCharCode(65 + j)}]${String(c || '')}`).join(' | ')}`
            ).join('\n');

            const prompt = `Eres un extractor de datos de planillas de aduana argentinas (Excel).
Analiza estas filas y extrae la información en formato JSON estricto.

FILAS DEL EXCEL:
${textRows}

Extrae este JSON (sin texto extra, solo el JSON):
{
  "ddt": "string 16 chars, formato: 5digitos+2letras+8digitos+1letra, sin espacios",
  "po": "string 9-10 digitos, es la orden/operacion",
  "buque": "nombre del buque",
  "destino": "pais destino",
  "terminal": "nombre terminal sin numeros ni parentesis",
  "canal": "verde/rojo/naranja o vacio",
  "header_row": numero_de_fila_donde_estan_los_headers_de_contenedores,
  "column_map": {
    "tipo": indice_columna_o_null,
    "numero": indice_columna,
    "precinto_aduana": indice_columna,
    "precinto_linea": indice_columna_o_null,
    "producto": indice_columna_o_null,
    "bultos": indice_columna_o_null,
    "peso_neto": indice_columna_o_null,
    "peso_bruto": indice_columna_o_null
  },
  "pattern_signature": "descripcion_breve_del_formato_detectado"
}

Los indices de columna empiezan en 0 (A=0, B=1, C=2...). Si un campo no existe, usa null.`;

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: CLAUDE_MODEL,
                        max_tokens: 1024,
                        messages: [{ role: 'user', content: prompt }]
                    })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    console.error('[AI] API error:', response.status, errText);
                    return null;
                }

                const result = await response.json();
                const text = result.content?.[0]?.text || '';

                // Extract JSON from response
                const jsonMatch = text.match(/\{[\s\S]*\}/);
                if (!jsonMatch) {
                    console.error('[AI] No JSON found in response:', text);
                    return null;
                }

                const parsed = JSON.parse(jsonMatch[0]);
                console.log('[AI] Claude extracted:', parsed);
                return parsed;

            } catch (err) {
                console.error('[AI] Error calling Claude:', err);
                return null;
            }
        }

        // Use AI extraction result to build order data from rows
        function buildOrderFromAIResult(aiResult, rows, tipoOrigen) {
            if (!aiResult || !aiResult.po) return null;

            const warnings = ['Datos extraidos con asistencia de IA'];
            const headerRowIdx = aiResult.header_row ? (aiResult.header_row - 1) : -1; // convert 1-based to 0-based
            const colMap = aiResult.column_map || {};

            const contenedores = [];
            let lastValid = null;
            if (headerRowIdx >= 0) {
                for (let i = headerRowIdx + 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length < 2) continue;

                    const numero = colMap.numero != null ? String(row[colMap.numero] || '').trim().replace(/[-\s]/g, '') : '';
                    let precAduana = colMap.precinto_aduana != null ? String(row[colMap.precinto_aduana] || '').trim().replace(/[_\s]/g, '').toUpperCase() : '';
                    const tipo = standardizeContainerType(colMap.tipo != null ? String(row[colMap.tipo] || '') : '');
                    const precLinea = colMap.precinto_linea != null ? String(row[colMap.precinto_linea] || '').trim().replace(/[_\s]/g, '').toUpperCase() : '';
                    const producto = colMap.producto != null ? String(row[colMap.producto] || '').trim() : '';
                    const bultos = colMap.bultos != null ? (parseFloat(row[colMap.bultos]) || 0) : 0;
                    const pesoNeto = colMap.peso_neto != null ? (parseFloat(row[colMap.peso_neto]) || 0) : 0;
                    const pesoBruto = colMap.peso_bruto != null ? (parseFloat(row[colMap.peso_bruto]) || 0) : 0;

                    // CASO 1: Contenedor válido
                    if (numero.length === 11) {
                        if (!precAduana || precAduana.length < 5) {
                            lastValid = { tipo, numero, precinto_aduana: '' };
                            continue;
                        }
                        lastValid = { tipo, numero, precinto_aduana: precAduana };

                        if (pesoNeto === 0 && pesoBruto === 0 && bultos === 0) continue;

                        const bultosSospechoso = Math.round(bultos) > 250;
                        if (bultosSospechoso) warnings.push(`Contenedor ${numero}: bultos=${Math.round(bultos)} sospechoso`);

                        contenedores.push({
                            tipo, numero,
                            precinto_aduana: precAduana,
                            precinto_linea: precLinea || null,
                            producto,
                            bultos: Math.round(bultos),
                            peso_neto: Math.round(pesoNeto),
                            peso_bruto: Math.round(pesoBruto),
                            bultos_sospechoso: bultosSospechoso
                        });
                        continue;
                    }

                    // CASO 2: Sin contenedor, con producto → otro producto del mismo contenedor
                    if (lastValid && producto && producto.length > 0 && (bultos > 0 || pesoNeto > 0)) {
                        contenedores.push({
                            tipo: lastValid.tipo,
                            numero: lastValid.numero,
                            precinto_aduana: lastValid.precinto_aduana,
                            precinto_linea: null,
                            producto,
                            bultos: Math.round(bultos),
                            peso_neto: Math.round(pesoNeto),
                            peso_bruto: Math.round(pesoBruto)
                        });
                        warnings.push(`Múltiples productos en contenedor ${lastValid.numero}`);
                        continue;
                    }

                    // CASO 3: fila de totales, ignorar
                }
            }

            if (contenedores.length === 0) return null;

            const productos = [...new Set(contenedores.map(c => c.producto).filter(p => p))];
            if (productos.length > 1) warnings.push('Multiples productos: ' + productos.join(', '));

            const lastDataRow = (headerRowIdx >= 0 ? headerRowIdx : 0) + contenedores.length + 10;
            let ddt = (aiResult.ddt || '').replace(/\s/g, '').toUpperCase();
            if (!ddt || ddt.length < 14) {
                ddt = 'REVISAR-' + aiResult.po;
                warnings.push('DDT requiere revision manual');
            }

            return {
                po: String(aiResult.po).trim(),
                ddt,
                buque: (aiResult.buque || '').trim(),
                destino: (aiResult.destino || '').trim(),
                terminal: (aiResult.terminal || '').trim(),
                canal: (aiResult.canal || '').trim(),
                tipo_origen: tipoOrigen,
                estado: 'PENDIENTE',
                cantidad_contenedores: contenedores.length,
                total_bultos: contenedores.reduce((s, c) => s + c.bultos, 0),
                total_peso_neto: contenedores.reduce((s, c) => s + c.peso_neto, 0),
                total_peso_bruto: contenedores.reduce((s, c) => s + c.peso_bruto, 0),
                contenedores,
                datos_originales: rows.slice(0, Math.min(lastDataRow, rows.length)),
                warnings
            };
        }

        // ─── LEARNED PATTERNS ───

        async function findLearnedPattern(rows) {
            // Generate a signature from the header area structure
            const sig = generatePatternSignature(rows);

            try {
                const { data, error } = await supabase

                    .eq('id', data.id);

                console.log(`[PATTERN] Found learned pattern: ${sig} (${data.usos} uses)`);
                return data.patron_valor;
            } catch (err) {

        async function saveLearnedPattern(rows, aiResult) {
            const sig = generatePatternSignature(rows);
            if (!sig || !aiResult) return;

            try {
                await supabase.from('patrones_aprendidos')
                    .upsert({
                        patron_tipo: 'excel_format',
                        patron_clave: sig,
                        patron_valor: {
