                            column_map: aiResult.column_map,
                            pattern_description: aiResult.pattern_signature || sig
                        },
                        usos: 1,
                        fecha_creacion: new Date().toISOString(),
                        fecha_ultimo_uso: new Date().toISOString()
                    }, { onConflict: 'patron_tipo,patron_clave' });

                console.log(`[PATTERN] Saved new pattern: ${sig}`);
            } catch (err) {
                console.error('[PATTERN] Error saving:', err);
            }
        }

        // Generate a signature based on the structure of the Excel (which cells contain keywords, not values)
        function generatePatternSignature(rows) {
            if (!rows || rows.length < 3) return null;
            const parts = [];
            for (let i = 0; i < Math.min(10, rows.length); i++) {
                const row = rows[i];
                if (!row) continue;
                for (let j = 0; j < Math.min(8, row.length); j++) {
                    const cell = String(row[j] || '').toUpperCase().trim();
                    // Only capture structural keywords, not values
                    for (const kw of ['DDT', 'ORDEN', 'OPERACI', 'BUQUE', 'DESTINO', 'TERMINAL', 'CANAL', 'CONTENEDOR', 'PRECINTO', 'BULTO', 'NETO', 'BRUTO', 'PRODUCTO']) {
                        if (cell.includes(kw)) {
                            parts.push(`${i}:${j}:${kw}`);
                        }
                    }
                }
            }
            return parts.length > 0 ? parts.sort().join('|') : null;
        }

        // ─── CONSULTAS ───
        async function buscarConsultas() {
            const search = document.getElementById('consultaSearch').value.trim();
            const multiText = document.getElementById('consultaMultiple').value.trim();
            const estadoFilter = document.getElementById('consultaEstado').value;
            const resultsList = document.getElementById('consultaResults');

            // Parse multiple POs
            const multiPOs = multiText ? multiText.split(/\n/).map(l => l.trim()).filter(l => l) : [];

            // If no search criteria, show warning
            if (!search && multiPOs.length === 0 && !estadoFilter) {
                resultsList.innerHTML = '<li class="consultas-empty">Ingres&aacute; un criterio de b&uacute;squeda</li>';
                return;
            }

            try {
                let results = [];

                if (multiPOs.length > 0) {
                    // Multiple PO search
                    const { data, error } = await supabase
                        .from('operaciones')
                        .select('*')
                        .in('po', multiPOs);
                    if (error) throw error;

                    // Also fetch containers for these
                    const ids = (data || []).map(d => d.id);
                    let contsMap = {};
                    if (ids.length > 0) {
                        const { data: conts } = await supabase
                            .from('contenedores')
                            .select('*')
                            .in('operacion_id', ids);
                        for (const c of (conts || [])) {
                            if (!contsMap[c.operacion_id]) contsMap[c.operacion_id] = [];
                            contsMap[c.operacion_id].push(c);
                        }
                    }

                    const foundPOs = new Set((data || []).map(d => d.po));
                    results = (data || []).map(op => ({ ...op, contenedores: contsMap[op.id] || [] }));

                    // Show not found POs
                    const notFound = multiPOs.filter(p => !foundPOs.has(p));
                    renderConsultaResults(results, notFound, estadoFilter);
                    return;

                } else if (search) {
                    // Single search: search by PO, DDT, or buque
                    let query = supabase.from('operaciones').select('*');
                    // Try to match PO exactly, or DDT/buque with ilike
                    const { data, error } = await supabase
                        .from('operaciones')
                        .select('*')
                        .or(`po.ilike.%${search}%,ddt.ilike.%${search}%,buque.ilike.%${search}%`);
                    if (error) throw error;

                    const ids = (data || []).map(d => d.id);
                    let contsMap = {};
                    if (ids.length > 0) {
                        const { data: conts } = await supabase
                            .from('contenedores')
                            .select('*')
                            .in('operacion_id', ids);
                        for (const c of (conts || [])) {
                            if (!contsMap[c.operacion_id]) contsMap[c.operacion_id] = [];
                            contsMap[c.operacion_id].push(c);
                        }
                    }

                    results = (data || []).map(op => ({ ...op, contenedores: contsMap[op.id] || [] }));

                } else {
                    // Estado filter only
                    const { data, error } = await supabase
                        .from('operaciones')
                        .select('*')
                        .eq('estado', estadoFilter);
                    if (error) throw error;

                    const ids = (data || []).map(d => d.id);
                    let contsMap = {};
                    if (ids.length > 0) {
                        const { data: conts } = await supabase
                            .from('contenedores')
                            .select('*')
                            .in('operacion_id', ids);
                        for (const c of (conts || [])) {
                            if (!contsMap[c.operacion_id]) contsMap[c.operacion_id] = [];
                            contsMap[c.operacion_id].push(c);
                        }
                    }

                    results = (data || []).map(op => ({ ...op, contenedores: contsMap[op.id] || [] }));
                }

                renderConsultaResults(results, [], estadoFilter);

            } catch (err) {
                console.error('Error en consulta:', err);
                showAlert('Error al buscar: ' + err.message, 'error');
            }
        }

        function renderConsultaResults(results, notFound, estadoFilter) {
            const list = document.getElementById('consultaResults');

            // Apply estado filter if set
            if (estadoFilter) {
                results = results.filter(r => r.estado === estadoFilter);
            }

            if (results.length === 0 && notFound.length === 0) {
                list.innerHTML = '<li class="consultas-empty">No se encontraron resultados</li>';
                return;
            }

            let html = '';
            for (const order of results) {
                const statusClass = order.estado === 'VALIDADO' ? 'validado'
                    : order.estado === 'RECHAZADO' ? 'rechazado' : 'pending';
                html += `
                    <li class="order-item" onclick="showConsultaDoc('${esc(order.po)}', this)" style="cursor:pointer;">
                        <div style="flex:1;">
                            <div>${esc(order.po)}</div>
                            <div class="order-info-line">${esc(order.buque || '')} - ${order.cantidad_contenedores || 0} cont.</div>
                        </div>
                        <span class="status-badge ${statusClass}">${esc(order.estado)}</span>
                    </li>`;
            }

            for (const po of notFound) {
                html += `<li class="not-found">&#9888;&#65039; PO ${esc(po)} &mdash; No encontrada</li>`;
            }

            list.innerHTML = html;

            // Store results for document view
            window._consultaResults = {};
            for (const r of results) window._consultaResults[r.po] = r;
        }

        function showConsultaDoc(po, clickedEl) {
            const order = window._consultaResults && window._consultaResults[po];
            if (!order) return;

            // Highlight active item
            document.querySelectorAll('#consultaResults .order-item').forEach(li => li.classList.remove('active'));
            if (clickedEl) clickedEl.classList.add('active');

            const panel = document.getElementById('consultaPanel');
            const conts = order.contenedores || [];
            const totalBultos = conts.reduce((s, c) => s + (c.bultos || 0), 0);
            const totalNeto = conts.reduce((s, c) => s + (c.peso_neto || 0), 0);
            const totalBruto = conts.reduce((s, c) => s + (c.peso_bruto || 0), 0);

            const statusClass = order.estado === 'VALIDADO' ? 'validado'
                : order.estado === 'RECHAZADO' ? 'rechazado' : 'pendiente';

            let statusText = order.estado;
            if (order.estado === 'VALIDADO' && order.validado_por) {
                statusText += ` &mdash; Validado por: ${esc(order.validado_por)}`;
                if (order.fecha_validacion) statusText += ` &mdash; ${new Date(order.fecha_validacion).toLocaleString('es-AR')}`;
            }
            if (order.estado === 'RECHAZADO' && order.motivo_rechazo) {
                statusText += ` &mdash; Motivo: ${esc(order.motivo_rechazo)}`;
            }

            let contRows = conts.map(c => `
                <tr>
                    <td>${esc(c.tipo)}</td>
                    <td>${esc(c.numero)}</td>
                    <td>${esc(c.precinto_aduana)}</td>
                    <td>${esc(c.producto || '')}</td>
                    <td>${c.bultos}</td>
                    <td>${(c.peso_neto || 0).toLocaleString('es-AR')}</td>
                    <td>${(c.peso_bruto || 0).toLocaleString('es-AR')}</td>
                </tr>
            `).join('');

            // Generate embarque text
            const embarqueText = generateEmbarqueText(order);

            panel.innerHTML = `
                <div class="doc-view">
                    <div class="doc-header">
                        <div><strong>DDT:</strong> ${esc(order.ddt)}</div>
                        <div>${order.fecha_validacion ? new Date(order.fecha_validacion).toLocaleDateString('es-AR') : ''}</div>
                    </div>
                    <div class="doc-field"><strong>OPERACI&Oacute;N:</strong> ${esc(order.po)}</div>
                    <div class="doc-field"><strong>BUQUE:</strong> ${esc(order.buque)}</div>
                    <div class="doc-field"><strong>DESTINO:</strong> ${esc(order.destino)}</div>
                    <div class="doc-field"><strong>TERMINAL:</strong> ${esc(order.terminal)}</div>

                    <div class="doc-status ${statusClass}">${statusText}</div>

                    <div style="font-weight:700;margin:14px 0 8px 0;font-size:13px;">CONTENEDORES:</div>
                    <table class="doc-table">
                        <thead>
                            <tr>
                                <th>Tipo</th>
                                <th>Contenedor</th>
                                <th>Precinto</th>
                                <th>Producto</th>
                                <th>Bultos</th>
                                <th>Neto</th>
                                <th>Bruto</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${contRows}
                            <tr class="totals-row">
                                <td colspan="3"></td>
                                <td style="text-align:right;font-weight:700;">TOTALES</td>
                                <td>${totalBultos}</td>
                                <td>${totalNeto.toLocaleString('es-AR')}</td>
                                <td>${totalBruto.toLocaleString('es-AR')}</td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="doc-summary">
                        RESUMEN: ${conts.length} contenedores | ${totalBultos} bultos | ${totalNeto.toLocaleString('es-AR')} kg neto | ${totalBruto.toLocaleString('es-AR')} kg bruto
                    </div>

                    <div class="embarque-section">
                        <label>Declaraci&oacute;n de Embarque</label>
                        <textarea class="embarque-textarea" id="embarqueText">${esc(embarqueText)}</textarea>
                        <button class="btn-copiar" onclick="copiarEmbarque()">&#128203; Copiar texto</button>
                    </div>
                </div>
            `;
        }

        function calculateBags(pesoNeto, bultos) {
            if (!bultos || bultos === 0 || !pesoNeto) return null;
            const kgPorBulto = pesoNeto / bultos;
            if (kgPorBulto >= 1400 && kgPorBulto <= 1600) {
                return String(Math.round(pesoNeto / 25));
            } else if (kgPorBulto >= 900 && kgPorBulto <= 1300) {
                return String(bultos);
            }
            return null;
        }

        function generateEmbarqueText(order) {
            const conts = order.contenedores || [];
            const cantContenedores = conts.length;

            // Tipos únicos estandarizados con espacio
            const tiposRaw = [...new Set(conts.map(c => standardizeContainerType(c.tipo)).filter(t => t))];
            const tiposFormatted = tiposRaw.map(t => t.replace(/(\d{2})([A-Z]{2})/, '$1 $2')).join(', ');

            // Agrupar por producto
            const productoGroups = {};
            for (const c of conts) {
                const prod = (c.producto || 'SIN PRODUCTO').trim();
                if (!productoGroups[prod]) {
                    productoGroups[prod] = { bultos: 0, pesoNeto: 0, pesoBruto: 0 };
                }
                productoGroups[prod].bultos += c.bultos || 0;
                productoGroups[prod].pesoNeto += c.peso_neto || 0;
                productoGroups[prod].pesoBruto += c.peso_bruto || 0;
            }

            const productos = Object.keys(productoGroups);
            const totalBultos = conts.reduce((s, c) => s + (c.bultos || 0), 0);
            const totalNeto = conts.reduce((s, c) => s + (c.peso_neto || 0), 0);
            const totalBruto = conts.reduce((s, c) => s + (c.peso_bruto || 0), 0);

            let text = `${cantContenedores} CONTAINERS OF ${tiposFormatted}\n`;

            if (productos.length === 1) {
                const bags = calculateBags(totalNeto, totalBultos);
                text += `SAID TO CONTAIN\n`;
                text += `DESCRIPTION GOODS:              ${productos[0]}\n`;
                text += `QUANTITY: ${bags !== null ? bags + ' BAGS IN ' : ''}${totalBultos} PALLETS\n`;
            } else {
                text += `SAID TO CONTAIN DESCRIPTION\n`;
                for (const prod of productos) {
                    const g = productoGroups[prod];
                    const bags = calculateBags(g.pesoNeto, g.bultos);
                    text += `GOODS:              ${prod}\n`;
                    text += `QUANTITY: ${bags !== null ? bags + ' BAGS IN ' : ''}${g.bultos} PALLETS\n`;
                }
            }

            text += `GROSS WEIGHT: ${totalBruto}\n`;
            text += `NET WEIGHT: ${totalNeto}\n`;
            text += `NCM: 3901\n`;
            text += `Wooden Material: YES\n`;
            text += `Wooden Condition: Treated and Certified\n`;

            const permit = (order.ddt && !order.ddt.startsWith('REVISAR-')) ? order.ddt : '(pendiente)';
            text += `Export Permit: ${permit}`;

            return text;
        }

        function copiarEmbarque() {
            const textarea = document.getElementById('embarqueText');
            if (!textarea) return;
            navigator.clipboard.writeText(textarea.value).then(() => {
                showAlert('Texto copiado al portapapeles', 'success');
            }).catch(() => {
                textarea.select();
                document.execCommand('copy');
                showAlert('Texto copiado', 'success');
            });
        }

        // Open a specific order in Consultas tab
        function verEnConsultas(po) {
            switchTab('consultas');
            document.getElementById('consultaSearch').value = po;
            document.getElementById('consultaMultiple').value = '';
            document.getElementById('consultaEstado').value = '';
            buscarConsultas();
        }

        // ─── CONTROL TAB ───
        let allControlOrders = [];

        async function loadControlData() {
            showLoading('Cargando registros...');
            try {
                const { data: ops, error: opsErr } = await supabase
                    .from('operaciones')
                    .select('*')
                    .order('po', { ascending: false });

                if (opsErr) throw opsErr;

                const { data: conts, error: contsErr } = await supabase
                    .from('contenedores')
                    .select('operacion_id, numero');

                if (contsErr) throw contsErr;

                const contsByOp = {};
                for (const c of (conts || [])) {
                    if (!contsByOp[c.operacion_id]) contsByOp[c.operacion_id] = [];
                    contsByOp[c.operacion_id].push(c.numero);
                }

                allControlOrders = (ops || []).map(op => ({
                    ...op,
                    contenedores_nums: contsByOp[op.id] || []
                }));

                hideLoading();
                renderControlTable();
            } catch (err) {
                hideLoading();
                showAlert('Error cargando control: ' + err.message, 'error');
            }
        }

        function renderControlTable() {
            const container = document.getElementById('controlContent');
            const countPending = allControlOrders.filter(o => o.estado === 'PENDIENTE').length;
            const countValidated = allControlOrders.filter(o => o.estado === 'VALIDADO').length;
            const countRejected = allControlOrders.filter(o => o.estado === 'RECHAZADO').length;

            let rowsHtml = '';
            for (const o of allControlOrders) {
                const statusClass = o.estado === 'VALIDADO' ? 'validado'
                    : o.estado === 'RECHAZADO' ? 'rechazado' : 'pending';
                rowsHtml += `<tr>
                    <td>${esc(o.po)}</td>
                    <td>${esc(o.ddt)}</td>
                    <td>${esc(o.buque)}</td>
                    <td><span class="status-badge ${statusClass}">${esc(o.estado)}</span></td>
                    <td>${esc(o.validado_por || '—')}</td>
                    <td style="text-align:center;">${o.cantidad_contenedores || 0}</td>
                    <td class="cont-list">${(o.contenedores_nums || []).map(n => esc(n)).join(', ')}</td>
                </tr>`;
            }

            container.style = '';
            container.innerHTML = `
                <div style="overflow:auto;max-height:calc(100vh - 200px);">
                    <table class="control-table">
                        <thead>
                            <tr>
                                <th>PO</th>
                                <th>Permiso (DDT)</th>
                                <th>Buque</th>
                                <th>Estado</th>
                                <th>Valid&oacute;</th>
                                <th>Cont.</th>
                                <th>Contenedores</th>
                            </tr>
                        </thead>
                        <tbody>${rowsHtml}</tbody>
                    </table>
                </div>
                <div class="control-summary">
                    <span>Total: ${allControlOrders.length} &oacute;rdenes | ${countPending} pendientes | ${countValidated} validadas | ${countRejected} rechazadas</span>
                    <button class="btn-export" onclick="exportControlToExcel()">Exportar a Excel</button>
                </div>
            `;
        }

        function exportControlToExcel() {
            const data = [
                ['PO', 'Permiso (DDT)', 'Buque', 'Estado', 'Validó', 'Cant. Contenedores', 'Contenedores']
            ];
            for (const o of allControlOrders) {
                data.push([
                    o.po,
                    o.ddt,
                    o.buque,
                    o.estado,
                    o.validado_por || '—',
                    o.cantidad_contenedores || 0,
                    (o.contenedores_nums || []).join(', ')
                ]);
            }
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Control');
            XLSX.writeFile(wb, `control_validador_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        // ─── TABS ───
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[onclick*="${tabName}"]`).classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
        }

        // ─── UTILITIES ───
        function standardizeContainerType(tipo) {
            if (!tipo) return '';
            tipo = tipo.trim().toUpperCase().replace(/\s+/g, '');
            // Si empieza con 2 letras seguidas de 2 dígitos, invertir (HC40 → 40HC)
            const match = tipo.match(/^([A-Z]{2})(\d{2})$/);
            if (match) return match[2] + match[1];
            return tipo;
        }

        function esc(str) {
            if (str == null) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function showAlert(message, type) {
            const alert = document.createElement('div');
            alert.className = `alert-toast ${type}`;
            alert.textContent = message;
            document.body.appendChild(alert);
            setTimeout(() => {
                alert.style.opacity = '0';
                alert.style.transition = 'opacity 0.3s';
                setTimeout(() => alert.remove(), 300);
            }, 4000);
        }

        function showLoading(msg) {
            let overlay = document.getElementById('loadingOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.className = 'loading-overlay';
                overlay.innerHTML = `<div class="loading-spinner">${esc(msg || 'Cargando...')}</div>`;
                document.body.appendChild(overlay);
            } else {
                overlay.querySelector('.loading-spinner').textContent = msg || 'Cargando...';
                overlay.style.display = 'flex';
            }
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.remove();
        }
    </script>
</body>
</html>
